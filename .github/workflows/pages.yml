name: Deploy Pages shell
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: {version: 10.13.1}
      - uses: actions/setup-node@v4
        with: {node-version: 26.5.0, cache: pnpm}
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec nx run shell:prerender
      - uses: actions/upload-pages-artifact@v3
        with: {path: dist/apps/shell}
  deploy:
    environment:
      name: github-pages
      url: "${{ steps.deployment.outputs.page_url }}"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to github.io project site
        id: deployment
        uses: actions/deploy-pages@v4
