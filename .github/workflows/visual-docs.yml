name: Visual docs
on:
  pull_request:
  push:
    branches: [master]
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: visual-docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  capture:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: pnpm/action-setup@v4
        with: {version: 10.13.1}
      - run: pnpm install --frozen-lockfile
      - uses: nickderobertis/screencomp@v0.4.2
      - name: Capture and diff affected microfrontends
        env:
          NX_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          NX_HEAD: ${{ github.sha }}
          SCREENCOMP_CAPTURE_CONTAINER: "1"
        run: |
          pnpm exec nx show projects --affected --with-target screenshot --base="$NX_BASE" --head="$NX_HEAD" > affected-visual-projects.txt
          pnpm exec nx affected -t screenshot --base="$NX_BASE" --head="$NX_HEAD" --parallel=3
      - uses: actions/upload-artifact@v4
        with:
          name: visual-captures
          path: |
            affected-visual-projects.txt
            apps/*/visual/current
            apps/*/visual/verify
          if-no-files-found: error
  publish:
    needs: capture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: nickderobertis/screencomp@v0.4.2
      - uses: actions/download-artifact@v4
        with: {name: visual-captures}
      - name: Build affected galleries and PR comment
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
          REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p site
          marker='<!-- screencomp -->'
          printf '%s\n## Visual changes\n\n' "$marker" > comment.md
          while IFS= read -r project; do
            [ -n "$project" ] || continue
            current="apps/$project/visual/current"
            manifest="apps/$project/visual/baseline/x86_64.json"
            screencomp gallery --input "$current" --arch x86_64 --output "site/$project" --title "$project visual docs"
            if [ "$EVENT_NAME" = pull_request ] && git show "origin/$BASE_REF:$manifest" > base.json 2>/dev/null; then
              screencomp comment --baseline-manifest base.json --current "$current" --arch x86_64 --marker "screencomp-$project" --gallery-url "https://${REPOSITORY%/*}.github.io/${REPOSITORY#*/}/pr-$PR_NUMBER/$project" --output project-comment.md
              sed '/<!-- screencomp-/d' project-comment.md >> comment.md
              printf '\n' >> comment.md
            fi
          done < affected-visual-projects.txt
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: site
          destination_dir: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || '' }}
          keep_files: true
      - name: Upsert visual diff comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" --jq '.[] | select(.body | contains("<!-- screencomp -->")) | .id' | head -1)
          if [ -n "$existing" ]; then
            gh api --method PATCH "repos/${{ github.repository }}/issues/comments/$existing" -F body=@comment.md
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body-file comment.md
          fi
