# yaml-language-server: $schema=https://raw.githubusercontent.com/nickderobertis/llmlint/main/assets/llmlint.schema.json
#
# The LLM-judge tier — separate from the deterministic `just check` gate.
# Run with `just lint-llm` (or `just lint-llm-diff` for the merge-base
# diff); the diff-scoped run is the blocking PR check, not part of `check`.
# Rules come from the pinned plugins below; tune one in place with
# `override: true`. Bump a plugin's `@version` pin to pull new rules.
files:
  # No `include`: llmlint lints the whole tree (exclude + .gitignore honored).
  # List committed files that shouldn't be judged (lock files, generated output).
  exclude:
    - "**/.git/**"
rationales: true
# No `agents` block: the harness/model are NOT pinned here. `oneharness.toml`
# (composed alongside this file) selects them in fallback mode — codex + gpt-5.5
# primary, claude-code + opus-4.8 secondary — so a Claude Code session falls
# through to claude-code with no config edit. Leaving the harness unset is what
# lets that fallback (or an ONEHARNESS_<FIELD> env override) decide.
plugins:
  - "https://raw.githubusercontent.com/nickderobertis/llmlint/main/assets/config_lint.yml@1"
  - "https://raw.githubusercontent.com/nickderobertis/dero-skills/main/skills/bootstrap/create-repo/assets/llmlint/base.llmlint.yml@1"
  - "https://raw.githubusercontent.com/nickderobertis/dero-skills/main/skills/bootstrap/create-repo/assets/llmlint/shapes/web-app.llmlint.yml@1"
  - "https://raw.githubusercontent.com/nickderobertis/dero-skills/main/skills/bootstrap/create-repo/assets/llmlint/shapes/react.llmlint.yml@1"
  - "https://raw.githubusercontent.com/nickderobertis/dero-skills/main/skills/bootstrap/create-repo/assets/llmlint/languages/typescript.llmlint.yml@1"
  - "https://raw.githubusercontent.com/nickderobertis/dero-skills/main/skills/bootstrap/create-repo/assets/llmlint/ci.llmlint.yml@1"
  - "https://raw.githubusercontent.com/nickderobertis/dero-skills/main/skills/bootstrap/create-repo/assets/llmlint/monorepo.llmlint.yml@1"
